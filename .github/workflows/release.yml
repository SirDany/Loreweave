name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.toml') }}

      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build:all

      - name: Generate Tauri icons
        run: pnpm --filter @loreweave/desktop exec tauri icon ./src-tauri/icons/icon.png

      - name: Stage desktop resources
        run: node scripts/stage-desktop-resources.mjs

      - name: Fetch portable Node sidecar
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
        run: node scripts/fetch-desktop-node.mjs

      - name: Build Tauri bundle
        env:
          # Optional updater signing — only set if both secrets exist.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm --filter @loreweave/desktop exec tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist-release
          shopt -s globstar nullglob
          for f in apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.{exe,msi,deb,AppImage,sig}; do
            cp "$f" dist-release/
          done
          ls -la dist-release/

      - uses: actions/upload-artifact@v4
        with:
          name: loreweave-${{ matrix.target }}
          path: dist-release/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
