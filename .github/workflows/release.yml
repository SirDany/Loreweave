name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.toml') }}

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build:all

      - name: Generate Tauri icons
        run: pnpm --filter @loreweave/desktop exec tauri icon ./src-tauri/icons/icon.png

      - name: Stage desktop resources
        run: node scripts/stage-desktop-resources.mjs

      - name: Fetch portable Node sidecar
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
        run: node scripts/fetch-desktop-node.mjs

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Setting version to $VERSION"
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const version = process.env.VERSION;
          const tauriConfPath = path.resolve('apps/desktop/src-tauri/tauri.conf.json');
          const cargoPath = path.resolve('apps/desktop/src-tauri/Cargo.toml');
          const tauriConf = JSON.parse(fs.readFileSync(tauriConfPath, 'utf8'));
          tauriConf.version = version;
          fs.writeFileSync(tauriConfPath, JSON.stringify(tauriConf, null, 2) + '\n', 'utf8');
          const cargo = fs.readFileSync(cargoPath, 'utf8').replace(/^version = .*/m, `version = "${version}"`);
          fs.writeFileSync(cargoPath, cargo, 'utf8');
          NODE

      - name: Build Tauri bundle
        env:
          # Optional updater signing — only set if both secrets exist.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_CONFIG_VERSION: ${{ env.VERSION }}
        run: pnpm --filter @loreweave/desktop exec tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist-release
          shopt -s globstar nullglob
          for f in apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.{exe,msi,deb,AppImage,sig}; do
            cp "$f" dist-release/
          done
          ls -la dist-release/

      - uses: actions/upload-artifact@v7
        with:
          name: loreweave-${{ matrix.target }}
          path: dist-release/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist-release
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist-release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
