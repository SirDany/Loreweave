name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # `@loreweave/cli` and `apps/web` resolve `@loreweave/core` via its
      # compiled `dist/` entry (see package.json `exports`), so we must
      # build before typecheck or test.
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: node packages/cli/dist/bin.js validate sagas/example-saga
