name: ci

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

concurrency:
  # On PRs, cancel superseded runs so a force-push doesn't queue stale CI.
  # On branch pushes, let runs finish so the latest commit always has a status.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version is pinned via the root package.json `packageManager`
      # field (currently pnpm@9.12.0). Don't also pass `version:` here —
      # pnpm/action-setup@v4 errors with "multiple versions specified".
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # `@loreweave/cli` and `apps/web` resolve `@loreweave/core` via its
      # compiled `dist/` entry (see package.json `exports`), so we must
      # build before typecheck or test. We filter out `@loreweave/desktop`
      # because its "build" script is `tauri build` — that needs Rust +
      # WebKit/GTK and is covered by the dedicated `release` workflow.
      - run: pnpm -r --filter '!@loreweave/desktop' build
      - run: pnpm -r --filter '!@loreweave/desktop' typecheck
      - run: pnpm -r --filter '!@loreweave/desktop' test
      - run: node packages/cli/dist/bin.js validate sagas/example-saga

  # Fail the build if any production dep has a known high/critical CVE.
  # Dev deps are excluded — vitest/typescript advisories don't ship to users.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level high

  # GitHub-native check that fails PRs introducing newly vulnerable deps
  # or licenses on your block list. Free for public repos.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
